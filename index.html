<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أسعار الذهب</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(135deg, #111827, #1f2937);
    margin: 0;
    padding: 20px;
    color: white;
}

h1 {
    text-align: center;
    color: gold;
}

.section-title {
    margin-top: 25px;
    color: #fbbf24;
    border-bottom: 2px solid #fbbf24;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
}

.card {
    background: #1f2937;
    padding: 20px;
    border-radius: 12px;
}

.card-title {
    color: #facc15;
    margin-bottom: 10px;
}

.sell { color: #22c55e; }
.buy { color: #ef4444; }

.status {
    text-align: center;
    margin-top: 10px;
    font-size: 12px;
    color: #9ca3af;
}
</style>
</head>

<body>

<h1>💰 أسعار الذهب لحظيًا</h1>
<div class="status" id="status">جاري التحميل...</div>

<div class="section-title">الذهب</div>
<div class="container" id="gold"></div>

<div class="section-title">العملات</div>
<div class="container" id="currency"></div>

<script>
// ⚠️ غيّر الرابط ده لرابط Railway بتاعك
const API_URL = "https://اسم-تطبيقك.up.railway.app/api/prices";

async function load() {
    const status = document.getElementById("status");
    try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error("Network error");
        const data = await res.json();

        const gold = document.getElementById("gold");
        const currency = document.getElementById("currency");

        gold.innerHTML = "";
        currency.innerHTML = "";

        for (let [k, v] of Object.entries(data)) {
            let card = document.createElement("div");
            card.className = "card";

            if (typeof v === "object") {
                card.innerHTML = `
                    <div class="card-title">${k}</div>
                    <div class="sell">بيع: ${v.بيع || v.sell}</div>
                    <div class="buy">شراء: ${v.شراء || v.buy}</div>
                `;
                gold.appendChild(card);
            } else {
                card.innerHTML = `
                    <div class="card-title">${k}</div>
                    <div>${v}</div>
                `;
                currency.appendChild(card);
            }
        }

        const now = new Date().toLocaleTimeString("ar-EG");
        status.textContent = `✅ آخر تحديث: ${now}`;
    } catch (e) {
        status.textContent = "❌ فشل الاتصال بالسيرفر";
        console.error(e);
    }
}

load();
setInterval(load, 60000);
</script>

</body>
</html>
